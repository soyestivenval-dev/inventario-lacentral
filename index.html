<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventario — La Central</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f5f4f0;--surface:#fff;--surface2:#f0efe9;--border:#e2e0d8;
  --text:#1c1b18;--text2:#6b6960;--text3:#9c9a91;
  --accent:#2d5be3;--accent-light:#eef2fd;
  --success:#1a7a4a;--success-light:#e8f5ee;
  --warning:#b45309;--warning-light:#fef3e2;
  --danger:#c0392b;--danger-light:#fdecea;
  --radius:10px;--radius-sm:6px;--mono:'DM Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 1.25rem;height:52px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;}
.topbar-logo{width:30px;height:30px;background:var(--accent);border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;}
.topbar h1{font-size:15px;font-weight:600;}
.topbar-sync{margin-left:auto;font-size:12px;color:var(--text3);display:flex;align-items:center;gap:5px;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--text3);flex-shrink:0;}
.sync-dot.ok{background:var(--success);} .sync-dot.err{background:var(--danger);} .sync-dot.loading{background:var(--warning);}
.container{max-width:640px;margin:0 auto;padding:1.25rem 1rem 4rem;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.1rem 1.25rem;margin-bottom:.875rem;}
.card-title{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--text3);margin-bottom:.75rem;}
.field{margin-bottom:.875rem;} .field:last-child{margin-bottom:0;}
.field label{display:block;font-size:13px;font-weight:500;color:var(--text2);margin-bottom:5px;}
.field input[type=text],.field input[type=date],.field select{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:inherit;font-size:14px;background:var(--surface);color:var(--text);-webkit-appearance:none;}
.field input:focus,.field select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(45,91,227,.1);}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.day-tabs{display:flex;gap:6px;}
.day-tab{flex:1;padding:10px 6px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;color:var(--text2);text-align:center;line-height:1.4;}
.day-tab.active{background:var(--accent);color:white;border-color:var(--accent);}
.svc-pills{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap;}
.svc-pill{padding:7px 16px;border-radius:20px;border:1px solid var(--border);font-size:13px;cursor:pointer;background:var(--surface);color:var(--text2);font-family:inherit;font-weight:500;}
.svc-pill.active{background:var(--accent-light);color:var(--accent);border-color:var(--accent);}
.svc-pill.done{background:var(--success-light);color:var(--success);border-color:var(--success);}

/* Tabla */
.prod-table{width:100%;border-collapse:collapse;font-size:13px;}
.prod-table th{font-size:10px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--text3);padding:0 4px 8px;border-bottom:1px solid var(--border);text-align:center;}
.prod-table th:first-child{text-align:left;padding-left:0;}
.prod-table td{padding:6px 4px;border-bottom:1px solid var(--border);vertical-align:middle;}
.prod-table tr:last-child td{border-bottom:none;}
.prod-table td:first-child{font-size:13px;color:var(--text);padding-left:0;}
.num{text-align:center;font-family:var(--mono);font-size:13px;color:var(--text2);}
.num-good{text-align:center;font-family:var(--mono);font-size:13px;color:var(--success);font-weight:500;}
.num-warn{text-align:center;font-family:var(--mono);font-size:13px;color:var(--danger);font-weight:500;}
.num-blue{text-align:center;font-family:var(--mono);font-size:13px;color:var(--accent);font-weight:500;}
.stock-avail{text-align:center;font-family:var(--mono);font-size:13px;font-weight:600;color:var(--accent);background:var(--accent-light);border-radius:4px;padding:3px 6px;display:inline-block;min-width:36px;}

/* Inputs numéricos */
.num-input{width:58px;padding:5px 4px;border:1px solid var(--border);border-radius:var(--radius-sm);text-align:center;font-family:var(--mono);font-size:13px;background:var(--surface2);color:var(--text);display:block;margin:0 auto;}
.num-input:focus{outline:none;border-color:var(--accent);background:var(--accent-light);}
.num-input.ingreso:focus{border-color:var(--success);background:var(--success-light);}
.num-input.novedad:focus{border-color:var(--danger);background:var(--danger-light);}
.num-input.linked{background:#f3f0ff;border-color:#c4b5fd;color:#5b21b6;font-weight:500;}

/* Select café/azúcar */
.cafe-select{width:90px;padding:5px 4px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:inherit;font-size:12px;background:var(--surface2);color:var(--text);display:block;margin:0 auto;text-align:center;-webkit-appearance:none;cursor:pointer;}
.cafe-select:focus{outline:none;border-color:var(--warning);background:var(--warning-light);}
.cafe-select.selected{background:var(--warning-light);border-color:var(--warning);color:var(--warning);font-weight:500;}

/* Tag anclado */
.linked-tag{display:inline-flex;align-items:center;gap:3px;font-size:10px;color:#7c3aed;background:#f3f0ff;border:1px solid #c4b5fd;border-radius:4px;padding:2px 6px;white-space:nowrap;}

.btn{padding:10px 20px;border-radius:var(--radius-sm);font-family:inherit;font-size:14px;font-weight:500;cursor:pointer;border:none;transition:all .15s;}
.btn-primary{background:var(--accent);color:white;} .btn-primary:hover{background:#2348c0;}
.btn-success{background:var(--success);color:white;} .btn-success:hover{background:#145e38;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text2);font-size:13px;padding:8px 14px;}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:1rem;align-items:center;}

.alert{padding:10px 14px;border-radius:var(--radius-sm);font-size:13px;margin-bottom:.875rem;}
.alert-info{background:var(--accent-light);color:var(--accent);}
.alert-success{background:var(--success-light);color:var(--success);}

.legend{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:.75rem;}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text3);}
.legend-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0;}

#toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:var(--text);color:white;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:500;opacity:0;pointer-events:none;transition:opacity .3s;z-index:999;white-space:nowrap;}
#toast.show{opacity:1;}
.btn-jornada{display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);font-family:inherit;font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;margin-left:8px;}
.btn-jornada:hover{background:var(--danger-light);color:var(--danger);border-color:var(--danger);}

@media(max-width:480px){
  .day-tab{font-size:12px;}
  .num-input{width:48px;font-size:12px;}
  .cafe-select{width:78px;font-size:11px;}
  .prod-table th{font-size:9px;}
  .prod-table td{padding:5px 2px;}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">
    <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="2">
      <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
      <polyline points="9 22 9 12 15 12 15 22"/>
    </svg>
  </div>
  <h1>Inventario · La Central</h1>
  <div class="topbar-sync">
    <div class="sync-dot" id="sync-dot"></div>
    <span id="sync-text">Listo</span>
  </div>
  <button class="btn-jornada" onclick="nuevaJornada()" title="Nueva jornada">
    <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.5"/></svg>
    Nueva jornada
  </button>
</div>

<div class="container">
  <div class="card">
    <div class="card-title">Datos del registro</div>
    <div class="row2">
      <div class="field">
        <label>Responsable</label>
        <select id="responsable">
          <option value="">— Selecciona —</option>
          <option>Maria Emma</option><option>Mariana</option><option>Estiven</option>
          <option>Cristian</option><option>Luz Adriana</option><option>Otro</option>
        </select>
      </div>
      <div class="field">
        <label>Fecha</label>
        <input type="date" id="fecha-servicio">
      </div>
    </div>
    <div id="otro-nombre" style="display:none;" class="field">
      <label>Nombre</label>
      <input type="text" id="nombre-otro" placeholder="Escribe el nombre">
    </div>
  </div>

  <div class="card">
    <div class="card-title">Día</div>
    <div class="day-tabs">
      <button class="day-tab" id="btn-mie" onclick="setDay('mie')">Miércoles<br><small style="font-weight:400;opacity:.75">2 servicios</small></button>
      <button class="day-tab" id="btn-dom" onclick="setDay('dom')">Domingo<br><small style="font-weight:400;opacity:.75">3 servicios</small></button>
    </div>
  </div>

  <div id="content-area"></div>
</div>

<div id="toast"></div>

<script>
var APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzsP9BnFGclqnYNbf-xh46zVy2NjwLXNvgvVvecEqZIT_PYyVIJBMxFRVSu3IexvPO9fg/exec";

// Productos y su tipo:
// type: 'num'    = input numérico normal
// type: 'cafe'   = solo aparece en svc1 y último servicio, selector Full/Medio/Rellenar
// type: 'linked' = copia el valor de 'Sobre' automáticamente
var PRODUCTS = [
  {name:"Botellas de agua", type:"num"},
  {name:"Jugos hit",        type:"num"},
  {name:"Bimboletos",       type:"num"},
  {name:"Pastelitos saludables", type:"num"},
  {name:"Vasos café",       type:"num"},
  {name:"Café",             type:"cafe"},
  {name:"Azúcar",           type:"cafe"},
  {name:"Libro meta 1",     type:"num"},
  {name:"Libro meta 2",     type:"num"},
  {name:"Biblia",           type:"num"},
  {name:"Pulseras",         type:"num"},
  {name:"Sobre",            type:"num"},
  {name:"Brochure",         type:"linked", source:"Sobre"},
  {name:"Carta del pastor", type:"linked", source:"Sobre"}
];

var DAYS = {
  mie: {label:"Miércoles", services:["Servicio 1","Servicio 2"]},
  dom: {label:"Domingo",   services:["Servicio 1","Servicio 2","Servicio 3"]}
};

var state    = loadState();
var currentDay = null;
var currentSvc = 0;
var inputs   = {};

function loadState(){
  try{ return JSON.parse(localStorage.getItem('inv_lc3')||'null')||initState(); }
  catch(e){ return initState(); }
}
function initState(){
  var s={stock:{},days:{}};
  PRODUCTS.forEach(function(p){ s.stock[p.name]=0; });
  return s;
}
function saveState(){ try{ localStorage.setItem('inv_lc3',JSON.stringify(state)); }catch(e){} }

document.getElementById('fecha-servicio').value = new Date().toISOString().split('T')[0];
document.getElementById('responsable').addEventListener('change',function(){
  document.getElementById('otro-nombre').style.display = this.value==='Otro'?'block':'none';
});

function getResponsable(){
  var s=document.getElementById('responsable').value;
  return s==='Otro'?(document.getElementById('nombre-otro').value||'Otro'):s;
}
function getFecha(){
  var f=document.getElementById('fecha-servicio').value;
  if(!f) return '';
  var p=f.split('-'); return p[2]+'/'+p[1]+'/'+p[0];
}
function setSyncStatus(type,msg){
  document.getElementById('sync-dot').className='sync-dot'+(type?' '+type:'');
  document.getElementById('sync-text').textContent=msg;
}
function showToast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); },2800);
}

function setDay(day){
  currentDay=day; currentSvc=0; inputs={};
  document.getElementById('btn-mie').classList.toggle('active',day==='mie');
  document.getElementById('btn-dom').classList.toggle('active',day==='dom');
  render();
}
function jumpSvc(i){
  var dayData=state.days[currentDay]||[];
  var nextAvail=0;
  while(nextAvail<dayData.length && dayData[nextAvail] && dayData[nextAvail].cerrado) nextAvail++;
  if(i>nextAvail){ showToast('Cierra el servicio anterior primero'); return; }
  currentSvc=i; inputs={}; render();
}

// ¿Debe mostrarse Café/Azúcar en este servicio?
function showCafe(svcIndex, numSvc){
  return svcIndex===0 || svcIndex===numSvc-1;
}

// Obtener el valor de Sobre desde inputs (para linked)
function getSobreVal(){
  return parseInt(inputs['Sobre_ent']||'')||0;
}

function render(){
  var area=document.getElementById('content-area');
  if(!currentDay){ area.innerHTML='<div class="alert alert-info">Selecciona el día para comenzar.</div>'; return; }
  var dayInfo=DAYS[currentDay];
  var numSvc=dayInfo.services.length;
  var dayData=state.days[currentDay]||[];
  var isFirst=currentSvc===0;
  var isLast=currentSvc===numSvc-1;
  var svcDone=dayData[currentSvc]&&dayData[currentSvc].cerrado;

  var html='';

  // Pills
  html+='<div class="svc-pills">';
  dayInfo.services.forEach(function(s,i){
    var done=dayData[i]&&dayData[i].cerrado;
    var active=i===currentSvc&&!done;
    html+='<button class="svc-pill '+(done?'done':(active?'active':''))+'" onclick="jumpSvc('+i+')">'+(done?'✓ ':'')+s+'</button>';
  });
  html+='</div>';

  if(svcDone){
    // Vista resumen servicio cerrado
    var d=dayData[currentSvc];
    html+='<div class="card"><div class="card-title">'+dayInfo.services[currentSvc]+' — cerrado</div>';
    html+='<table class="prod-table"><thead><tr><th>Producto</th>';
    if(isFirst) html+='<th>Ingreso</th><th>Novedad</th>';
    html+='<th>Disponible</th><th>Entregado</th><th>Stock queda</th></tr></thead><tbody>';
    PRODUCTS.forEach(function(p){
      var pname=p.name;
      if(p.type==='cafe' && !showCafe(currentSvc,numSvc)) return;
      var ing =d.ingresos&&d.ingresos[pname]?d.ingresos[pname]:0;
      var nov =d.novedades&&d.novedades[pname]?d.novedades[pname]:0;
      var disp=d.disponible[pname]||0;
      var ent =d.entregados[pname]||0;
      var queda=d.stockFinal[pname]||0;
      html+='<tr><td>'+pname+(p.type==='linked'?'<br><span class="linked-tag">⚓ '+p.source+'</span>':'')+'</td>';
      if(isFirst){
        html+='<td class="'+(ing>0?'num-good':'num')+'">'+ing+'</td>';
        html+='<td class="'+(nov>0?'num-warn':'num')+'">'+nov+'</td>';
      }
      if(p.type==='cafe'){
        html+='<td class="num" colspan="3" style="text-align:center;">'+disp+'</td>';
      } else {
        html+='<td class="num-blue">'+disp+'</td>';
        html+='<td class="'+(ent>0?'num-good':'num')+'">'+ent+'</td>';
        html+='<td class="num">'+queda+'</td>';
      }
      html+='</tr>';
    });
    html+='</tbody></table>';
    if(currentSvc<numSvc-1){
      html+='<div class="btn-row"><button class="btn btn-primary" onclick="jumpSvc('+(currentSvc+1)+')">Ir al '+dayInfo.services[currentSvc+1]+' →</button></div>';
    }
    html+='</div>';

  } else {
    // Formulario activo
    html+='<div class="card">';
    html+='<div class="card-title">'+dayInfo.services[currentSvc]+(isFirst?' — ingreso, novedades y entrega':' — entrega del servicio')+'</div>';

    if(isFirst){
      html+='<div class="legend">';
      html+='<div class="legend-item"><div class="legend-dot" style="background:var(--success)"></div>Ingreso = nuevo stock</div>';
      html+='<div class="legend-item"><div class="legend-dot" style="background:var(--danger)"></div>Novedad = vencido / salida extra</div>';
      html+='<div class="legend-item"><div class="legend-dot" style="background:#7c3aed"></div>Anclado = copia Sobre</div>';
      html+='</div>';
    }

    // Cabecera tabla
    html+='<table class="prod-table"><thead><tr><th>Producto</th>';
    if(isFirst) html+='<th>Ingreso</th><th>Novedad</th>';
    html+='<th>Disponible</th><th>Entregado</th><th>Queda</th></tr></thead><tbody>';

    var sobreVal=getSobreVal();

    PRODUCTS.forEach(function(p){
      var pname=p.name;
      var stock=state.stock[pname];

      // Café y Azúcar: solo svc1 y último
      if(p.type==='cafe'){
        if(!showCafe(currentSvc,numSvc)) return; // no mostrar
        var cafeSel=inputs[pname+'_cafe']||'';
        html+='<tr><td>'+pname+'</td>';
        if(isFirst) html+='<td colspan="2"></td>';
        html+='<td colspan="3" style="text-align:center;">';
        html+='<select class="cafe-select'+(cafeSel?' selected':'')+'" onchange="inputs[\''+pname+'_cafe\']=this.value;renderRefresh()" >';
        html+='<option value="">— Estado —</option>';
        ['Full','Medio','Rellenar'].forEach(function(op){
          html+='<option'+(cafeSel===op?' selected':'')+'>'+op+'</option>';
        });
        html+='</select></td></tr>';
        return;
      }

      // Linked: copia de Sobre
      if(p.type==='linked'){
        var disp=isFirst?Math.max(0,stock+(parseInt(inputs[pname+'_ing']||'')||0)-(parseInt(inputs[pname+'_nov']||'')||0)):stock;
        var ent=sobreVal; // mismo que Sobre
        var queda=Math.max(0,disp-ent);
        html+='<tr>';
        html+='<td>'+pname+'<br><span class="linked-tag">⚓ Sobre</span></td>';
        if(isFirst){
          html+='<td><input class="num-input ingreso" type="number" min="0" value="'+(inputs[pname+'_ing']||'')+'" placeholder="0" oninput="inputs[\''+pname+'_ing\']=this.value;renderRefresh()"></td>';
          html+='<td><input class="num-input novedad" type="number" min="0" value="'+(inputs[pname+'_nov']||'')+'" placeholder="0" oninput="inputs[\''+pname+'_nov\']=this.value;renderRefresh()"></td>';
          html+='<td><span class="stock-avail" id="disp_'+makeId(pname)+'">'+disp+'</span></td>';
        } else {
          html+='<td class="num-blue">'+disp+'</td>';
        }
        html+='<td class="num linked" id="ent_'+makeId(pname)+'" style="color:#7c3aed;font-weight:600;">'+ent+'</td>';
        html+='<td class="num">'+queda+'</td>';
        html+='</tr>';
        return;
      }

      // Tipo num normal
      var ing =isFirst?(parseInt(inputs[pname+'_ing']||'')||0):0;
      var nov =isFirst?(parseInt(inputs[pname+'_nov']||'')||0):0;
      var disp=isFirst?Math.max(0,stock+ing-nov):stock;
      var ent =parseInt(inputs[pname+'_ent']||'')||0;
      var queda=Math.max(0,disp-ent);
      var isSobre=pname==='Sobre';

      html+='<tr>';
      html+='<td>'+pname+'</td>';
      if(isFirst){
        html+='<td><input class="num-input ingreso" type="number" min="0" value="'+(inputs[pname+'_ing']||'')+'" placeholder="0" oninput="inputs[\''+pname+'_ing\']=this.value;renderRefresh()"></td>';
        html+='<td><input class="num-input novedad" type="number" min="0" value="'+(inputs[pname+'_nov']||'')+'" placeholder="0" oninput="inputs[\''+pname+'_nov\']=this.value;renderRefresh()"></td>';
        html+='<td><span class="stock-avail" id="disp_'+makeId(pname)+'">'+disp+'</span></td>';
      } else {
        html+='<td class="num-blue">'+disp+'</td>';
      }
      html+='<td><input class="num-input'+(isSobre?' sobre-input':'')+'" type="number" min="0" max="'+disp+'" value="'+(inputs[pname+'_ent']||'')+'" placeholder="0" oninput="inputs[\''+pname+'_ent\']=this.value;renderRefresh()"></td>';
      html+='<td class="'+(queda<disp&&disp>0?'num-good':'num')+'">'+queda+'</td>';
      html+='</tr>';
    });

    html+='</tbody></table>';
    var btnLabel=isLast?'✓ Cerrar y guardar en Sheets':'→ Cerrar y pasar al siguiente servicio';
    var btnCls  =isLast?'btn-success':'btn-primary';
    html+='<div class="btn-row"><button class="btn '+btnCls+'" onclick="cerrarServicio()">'+btnLabel+'</button></div>';
    html+='</div>';
  }

  // Resumen del día — stock inicial + cada servicio + stock final
  var dayData2=state.days[currentDay]||[];
  var cerrados2=dayData2.filter(function(d){ return d&&d.cerrado; });
  if(cerrados2.length>=1){
    // Calcular stock inicial (antes de cualquier movimiento del día)
    // = stock actual + todo lo entregado hoy - todo lo ingresado hoy + todas las novedades
    var stockInicial={};
    PRODUCTS.forEach(function(p){
      if(p.type==='cafe') return;
      var stockAhora=state.stock[p.name];
      var totalEnt=0, totalIng=0, totalNov=0;
      dayData2.forEach(function(d){
        if(d&&d.cerrado){
          totalEnt+=d.entregados[p.name]||0;
          totalIng+=d.ingresos[p.name]||0;
          totalNov+=d.novedades[p.name]||0;
        }
      });
      stockInicial[p.name]=stockAhora+totalEnt-totalIng+totalNov;
    });

    html+='<div class="card"><div class="card-title">Resumen del día</div>';
    html+='<div style="overflow-x:auto;">';
    html+='<table class="prod-table"><thead><tr><th>Producto</th><th>Stock inicial</th>';
    dayInfo.services.forEach(function(s,i){
      if(dayData2[i]&&dayData2[i].cerrado) html+='<th>'+s+'</th>';
    });
    // Stock final solo si todos los servicios están cerrados
    var todosCerrados=dayData2.filter(function(d){ return d&&d.cerrado; }).length===numSvc;
    if(todosCerrados) html+='<th>Stock final</th>';
    html+='</tr></thead><tbody>';

    PRODUCTS.forEach(function(p){
      if(p.type==='cafe') return;
      html+='<tr><td>'+p.name+'</td>';
      // Stock inicial
      html+='<td class="num-blue">'+(stockInicial[p.name]||0)+'</td>';
      // Cada servicio: entregados
      dayInfo.services.forEach(function(s,i){
        if(dayData2[i]&&dayData2[i].cerrado){
          var v=dayData2[i].entregados[p.name]||0;
          html+='<td class="'+(v>0?'num-good':'num')+'">'+v+'</td>';
        }
      });
      // Stock final
      if(todosCerrados){
        var sf=state.stock[p.name]||0;
        html+='<td class="num" style="font-weight:600;">'+sf+'</td>';
      }
      html+='</tr>';
    });

    // Fila especial para Café y Azúcar
    PRODUCTS.forEach(function(p){
      if(p.type!=='cafe') return;
      html+='<tr><td>'+p.name+'</td><td class="num">—</td>';
      dayInfo.services.forEach(function(s,i){
        if(dayData2[i]&&dayData2[i].cerrado){
          var v=dayData2[i].entregados[p.name]||'—';
          html+='<td class="num" style="color:var(--warning);font-weight:500;">'+v+'</td>';
        }
      });
      if(todosCerrados) html+='<td class="num">—</td>';
      html+='</tr>';
    });

    html+='</tbody></table></div></div>';
  }

  area.innerHTML=html;
}

function makeId(name){
  return name.replace(/\s+/g,'_').replace(/[éê]/g,'e').replace(/[úü]/g,'u').replace(/[áà]/g,'a').replace(/[íì]/g,'i').replace(/[óò]/g,'o').replace(/ñ/g,'n').replace(/[^a-zA-Z0-9_]/g,'');
}
function renderRefresh(){
  // Actualizar solo valores calculados sin re-dibujar inputs (evita perder foco)
  var isFirst = currentSvc === 0;
  var dayInfo = DAYS[currentDay];
  var numSvc  = dayInfo ? dayInfo.services.length : 0;
  var sobreVal = parseInt(inputs['Sobre_ent']||'')||0;

  PRODUCTS.forEach(function(p){
    var pname = p.name;
    var stock = state.stock[pname];

    if(p.type==='cafe') return;

    var ing  = isFirst ? (parseInt(inputs[pname+'_ing']||'')||0) : 0;
    var nov  = isFirst ? (parseInt(inputs[pname+'_nov']||'')||0) : 0;
    var disp = isFirst ? Math.max(0, stock+ing-nov) : stock;

    // Actualizar disponible
    var dispEl = document.getElementById('disp_'+pname.replace(/\s+/g,'_').replace(/[^a-zA-Z0-9_]/g,''));
    if(dispEl) dispEl.textContent = disp;

    // Actualizar entregado (linked) y queda
    var ent;
    if(p.type==='linked'){
      ent = sobreVal;
      var entEl = document.getElementById('ent_'+pname.replace(/\s+/g,'_').replace(/[^a-zA-Z0-9_]/g,''));
      if(entEl) entEl.textContent = ent;
    } else {
      ent = parseInt(inputs[pname+'_ent']||'')||0;
    }
    var queda = Math.max(0, disp - ent);
    var quedaEl = document.getElementById('queda_'+pname.replace(/\s+/g,'_').replace(/[^a-zA-Z0-9_]/g,''));
    if(quedaEl){
      quedaEl.textContent = queda;
      quedaEl.className = (queda < disp && disp > 0) ? 'num-good' : 'num';
    }
  });
}

function cerrarServicio(){
  if(!getResponsable()){ showToast('Selecciona el responsable primero'); return; }
  if(!state.days[currentDay]) state.days[currentDay]=[];
  var dayInfo=DAYS[currentDay];
  var numSvc=dayInfo.services.length;
  var isFirst=currentSvc===0;
  var sobreEnt=parseInt(inputs['Sobre_ent']||'')||0;
  var ingresos={},novedades={},disponible={},entregados={},stockFinal={};

  PRODUCTS.forEach(function(p){
    var pname=p.name;
    var stock=state.stock[pname];

    if(p.type==='cafe'){
      if(!showCafe(currentSvc,numSvc)){
        // no aplica este servicio, pasar stock sin cambio
        disponible[pname]=stock; entregados[pname]=0; stockFinal[pname]=stock;
        ingresos[pname]=0; novedades[pname]=0;
        return;
      }
      var sel=inputs[pname+'_cafe']||'';
      disponible[pname]=sel; entregados[pname]=sel; stockFinal[pname]=sel;
      ingresos[pname]=0; novedades[pname]=0;
      return;
    }

    var ing=isFirst?(parseInt(inputs[pname+'_ing']||'')||0):0;
    var nov=isFirst?(parseInt(inputs[pname+'_nov']||'')||0):0;
    var disp=isFirst?Math.max(0,stock+ing-nov):stock;
    var ent;
    if(p.type==='linked'){
      ent=sobreEnt;
    } else {
      ent=parseInt(inputs[pname+'_ent']||'')||0;
    }
    ent=Math.min(ent,disp);
    var queda=Math.max(0,disp-ent);
    ingresos[pname]=ing; novedades[pname]=nov;
    disponible[pname]=disp; entregados[pname]=ent; stockFinal[pname]=queda;
    state.stock[pname]=queda;
  });

  state.days[currentDay][currentSvc]={
    cerrado:true, ingresos:ingresos, novedades:novedades,
    disponible:disponible, entregados:entregados, stockFinal:stockFinal
  };
  saveState();
  enviarASheets(entregados,stockFinal,ingresos,novedades);
  inputs={};
  if(currentSvc<numSvc-1) currentSvc++;
  render();
}

function enviarASheets(entregados,stockFinal,ingresos,novedades){
  setSyncStatus('loading','Guardando...');
  var dayInfo=DAYS[currentDay];
  var payload={
    fecha:getFecha(), dia:dayInfo.label,
    servicio:dayInfo.services[currentSvc],
    responsable:getResponsable(),
    productos:PRODUCTS.map(function(p){
      return {
        nombre:p.name,
        ingreso:ingresos[p.name]||0,
        novedad:novedades[p.name]||0,
        entregado:entregados[p.name]||0,
        stockFinal:stockFinal[p.name]||0
      };
    })
  };
  // Envío via iframe oculto — evita CORS completamente
  var url = APPS_SCRIPT_URL + '?data=' + encodeURIComponent(JSON.stringify(payload));
  var iframe = document.getElementById('hidden-sender');
  if(!iframe){
    iframe = document.createElement('iframe');
    iframe.id = 'hidden-sender';
    iframe.name = 'hidden-sender';
    iframe.style.display = 'none';
    document.body.appendChild(iframe);
  }
  var form = document.createElement('form');
  form.method = 'GET';
  form.action = APPS_SCRIPT_URL;
  form.target = 'hidden-sender';
  var input = document.createElement('input');
  input.type = 'hidden';
  input.name = 'data';
  input.value = JSON.stringify(payload);
  form.appendChild(input);
  document.body.appendChild(form);
  form.submit();
  document.body.removeChild(form);
  setTimeout(function(){
    setSyncStatus('ok','Guardado en Sheets ✓');
    showToast('✓ Registro guardado en Google Sheets');
  }, 2000);
}

function nuevaJornada(){
  if(!confirm('¿Iniciar nueva jornada? Esto limpia todos los datos de la sesión actual. El historial en Google Sheets no se borra.')) return;
  state = initState();
  saveState();
  currentDay = null;
  currentSvc = 0;
  inputs = {};
  document.getElementById('btn-mie').classList.remove('active');
  document.getElementById('btn-dom').classList.remove('active');
  document.getElementById('responsable').value = '';
  document.getElementById('fecha-servicio').value = new Date().toISOString().split('T')[0];
  setSyncStatus('','Listo');
  render();
  showToast('✓ Jornada reiniciada');
}

// Al abrir la app, cargar stock desde Sheets
cargarStockDesdeSheets();

function cargarStockDesdeSheets() {
  setSyncStatus('loading', 'Cargando stock...');
  // JSONP — única forma de leer datos de Apps Script sin CORS
  var callbackName = 'gsCallback_' + Date.now();
  var script = document.createElement('script');
  var timeout = setTimeout(function(){
    // Si tarda más de 15 segundos, usar datos locales
    delete window[callbackName];
    try { document.body.removeChild(script); } catch(e){}
    setSyncStatus('', 'Usando datos locales');
    render();
  }, 15000);

  // Usar Cloudflare Worker como proxy — funciona en todos los dispositivos
  fetch('https://inventario-proxy.soyestivenval.workers.dev')
    .then(function(r){ return r.json(); })
    .then(function(data){
      clearTimeout(timeout);
      if(data.status === 'ok' && data.stock) {
        Object.keys(data.stock).forEach(function(nombre){
          if(state.stock.hasOwnProperty(nombre)){
            state.stock[nombre] = parseInt(data.stock[nombre]) || 0;
          }
        });
        saveState();
        var info = data.ultimoRegistro;
        var msg = info ? ('Último: '+info.servicio+' · '+info.dia) : 'Stock cargado';
        setSyncStatus('ok', msg);
        showToast('✓ Stock cargado desde Sheets');
      } else {
        setSyncStatus('', 'Sin registros previos');
      }
      render();
    })
    .catch(function(){
      clearTimeout(timeout);
      setSyncStatus('', 'Usando datos locales');
      render();
    });
}
